<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Styx</title>

    <!-- Inter — same font used by shadcn/ui and Next.js defaults -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Compiled Tailwind output — generated by the pre_build hook in Trunk.toml -->

</head>
<body class="min-h-screen bg-background font-sans antialiased"></body>
